name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run test suite
        run: pytest

  docker-build-smoke:
    name: Docker Build Smoke
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: codex-console:ci
          cache-from: type=gha,scope=ci-docker-smoke
          cache-to: type=gha,mode=max,scope=ci-docker-smoke

      - name: Start smoke-test container
        run: |
          docker run -d \
            --name codex-console-smoke \
            -p 18080:1455 \
            -e WEBUI_HOST=0.0.0.0 \
            -e WEBUI_PORT=1455 \
            -e WEBUI_ACCESS_PASSWORD=ci-smoke-password \
            codex-console:ci

      - name: Verify login page responds
        run: |
          for attempt in $(seq 1 15); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs codex-console-smoke
          exit 1

      - name: Clean up smoke-test container
        if: always()
        run: docker rm -f codex-console-smoke

  package-smoke:
    name: PyInstaller Smoke
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build Linux package
        run: pyinstaller codex_register.spec --clean --noconfirm

      - name: Verify packaged binary exists
        run: test -f dist/codex-console
